<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blue Swan · Lotus Lake · Rive-Style Animation</title>
<style>
  :root {
    --bg-1: #0a1c30; --bg-2: #123048;
    --panel: rgba(8, 26, 46, 0.78); --line: rgba(120, 195, 220, 0.34);
    --text: #d4ecf5; --accent: #49a9ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: radial-gradient(circle at 50% 18%, rgba(95, 188, 211, 0.18), transparent 38%), linear-gradient(180deg, var(--bg-1), var(--bg-2));
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--text); overflow: hidden;
  }
  .wrap { width: min(94vw, 980px); display: grid; gap: 18px; justify-items: center; }
  .title { font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; opacity: 0.78; }
  .stage {
    width: min(92vw, 720px); aspect-ratio: 1 / 1; border-radius: 50%;
    background: rgba(6, 22, 40, 0.5);
    box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42), inset 0 0 0 1px rgba(130, 205, 230, 0.14);
    overflow: hidden;
  }
  svg { width: 100%; height: 100%; display: block; cursor: pointer; user-select: none; }
  .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center; }
  .pill, button {
    border: 1px solid var(--line); background: var(--panel); color: var(--text);
    border-radius: 999px; height: 38px; padding: 0 17px; display: inline-flex;
    align-items: center; gap: 9px; backdrop-filter: blur(12px); box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22);
  }
  button { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease; }
  button:hover { transform: translateY(-1px); border-color: rgba(130, 210, 235, 0.8); background: rgba(20, 56, 92, 0.85); }
  button.active { background: linear-gradient(180deg, #1c7ee8, #0a4fa6); color: white; border-color: #8fcaff; }
  .state-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .state-text { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
  #swan, #neck-head, #wing, #raised-wing, .lotus, .leaf, .ripple, .feather, .grass {
    transform-box: fill-box; transform-origin: center;
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="title">Blue Swan · Lotus Lake · Rive-Style</div>
    <section class="stage">
      <svg id="scene" viewBox="0 0 1000 1000" role="img" aria-label="Animated blue swan on a lotus lake">
        <defs>

          <linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#A8DCD3"/><stop offset="0.45" stop-color="#5FBCD3"/><stop offset="1" stop-color="#2E7FC2"/></linearGradient>
          <linearGradient id="swanNeck" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9ed6ff"/><stop offset="45%" stop-color="#55adff"/><stop offset="100%" stop-color="#0962dd"/></linearGradient>

                <path d="M665 500 L707 495 L762 604 L715 600 Z" fill="#074bb5" opacity="0.46"/>
                <path d="M626 448 L665 500 L715 600 L676 594 Z" fill="#55b9ff" opacity="0.56"/>
                <path d="M676 594 L715 600 L770 787 L703 735 Z" fill="#083f9d" opacity="0.48"/>
                <path d="M655 754 L676 594 L703 735 L685 805 Z" fill="#83d2ff" opacity="0.42"/>
                <path d="M703 735 L770 787 L720 823 L685 805 Z" fill="#064ab2" opacity="0.50"/>
              </g>

                <clipPath id="beakClip"><path d="M735 224 C785 234 850 268 898 304 C910 313 903 325 888 322 C829 310 771 286 720 263 C711 248 716 231 735 224 Z"/></clipPath>

    </section>

    <div class="controls">
      <div class="pill" aria-live="polite">
        <span class="state-dot" id="stateDot"></span>
        <span class="state-text" id="stateText">Idle</span>
      </div>
      <button type="button" id="idleBtn" class="active">Float</button>
      <button type="button" id="alertBtn">Alert</button>
      <button type="button" id="flapBtn">Flap</button>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const scene = document.getElementById('scene');
    const stateText = document.getElementById('stateText');
    const stateDot = document.getElementById('stateDot');
    const buttons = { idle: document.getElementById('idleBtn'), alert: document.getElementById('alertBtn'), flap: document.getElementById('flapBtn') };
    let state = 'idle';
    const colors = { idle: '#49a9ff', alert: '#ffd166', flap: '#ff5a5f' };

    function setState(next) {
      state = next;
      stateText.textContent = next.charAt(0).toUpperCase() + next.slice(1);
      stateDot.style.background = colors[next];
      stateDot.style.boxShadow = `0 0 12px ${colors[next]}`;
      Object.values(buttons).forEach(btn => btn.classList.remove('active'));
      buttons[next].classList.add('active');
    }

    const floatTL = gsap.to('#swan', { y: -14, duration: 3.2, ease: 'sine.inOut', repeat: -1, yoyo: true });
    const neckTL = gsap.to('#neck-head', { rotation: 1.1, svgOrigin: '336 752', duration: 4.2, ease: 'sine.inOut', repeat: -1, yoyo: true });
    const wingTL = gsap.to('#wing', { rotation: -1.6, scaleY: 1.015, svgOrigin: '520 700', duration: 2.2, ease: 'sine.inOut', repeat: -1, yoyo: true });

    gsap.utils.toArray('.feather').forEach((el, i) => {
      gsap.to(el, { rotation: i % 2 ? 1.8 : -1.6, svgOrigin: '300 705', duration: 1.8 + i * 0.16, ease: 'sine.inOut', repeat: -1, yoyo: true, delay: i * 0.14 });
    });
    gsap.utils.toArray('.ripple').forEach((el, i) => {
      gsap.fromTo(el, { scale: 0.82, opacity: 0.5, transformOrigin: '50% 50%' }, { scale: 1.25, opacity: 0.02, duration: 3.8, repeat: -1, ease: 'power1.out', delay: i * 1.1 });
    });
    gsap.utils.toArray('.lotus').forEach((el, i) => {
      gsap.to(el, { rotation: i % 2 ? -3 : 3, transformOrigin: '50% 100%', duration: 2.8 + i * 0.3, ease: 'sine.inOut', repeat: -1, yoyo: true, delay: i * 0.3 });
    });
    gsap.utils.toArray('.grass').forEach((el, i) => {
      gsap.to(el, { rotation: i % 2 ? 1.6 : -1.6, transformOrigin: '50% 50%', duration: 3.4 + i * 0.25, ease: 'sine.inOut', repeat: -1, yoyo: true });
    });

    function idle() {
      if (state === 'flap') return;
      setState('idle');
      gsap.to('#swan', { y: 0, duration: 0.7, ease: 'sine.out', onComplete: () => floatTL.play() });
      gsap.to('#neck-head', { rotation: 0, svgOrigin: '336 752', duration: 0.7, ease: 'sine.out', onComplete: () => neckTL.play() });
      gsap.to('#wing', { rotation: 0, scaleY: 1, svgOrigin: '520 700', duration: 0.55, ease: 'sine.out', onComplete: () => wingTL.play() });
    }
    function alert() {
      if (state === 'flap') return;
      setState('alert');
      floatTL.pause(); neckTL.pause(); wingTL.pause();
      gsap.to('#swan', { y: -22, duration: 0.45, ease: 'power2.out' });
      gsap.to('#neck-head', { rotation: -3.5, svgOrigin: '336 752', duration: 0.6, ease: 'power2.out' });
      gsap.to('#wing', { rotation: -3, scaleY: 1.025, svgOrigin: '520 700', duration: 0.45, ease: 'power2.out' });
    }
    function flap() {
      if (state === 'flap') return;
      setState('flap');
      floatTL.pause(); neckTL.pause(); wingTL.pause();
      const tl = gsap.timeline({
        onComplete: () => { gsap.set('#raised-wing', { opacity: 0, rotation: 0, scale: 1 }); gsap.set('#wing', { opacity: 1 }); idle(); }
      });
      tl.to('#wing', { opacity: 0, duration: 0.12 }, 0)
        .fromTo('#raised-wing', { opacity: 0, rotation: 18, scale: 0.82, svgOrigin: '500 710' },
          { opacity: 1, rotation: -10, scale: 1, svgOrigin: '500 710', duration: 0.28, ease: 'back.out(1.6)' }, 0.08)
        .to('#raised-wing', { rotation: 16, svgOrigin: '500 710', duration: 0.18, ease: 'power2.in' })
        .to('#swan', { y: 6, duration: 0.18, ease: 'power2.in' }, '<')
        .to('#raised-wing', { rotation: -13, svgOrigin: '500 710', duration: 0.22, ease: 'power2.out' })
        .to('#swan', { y: -14, duration: 0.22, ease: 'power2.out' }, '<')
        .to('#raised-wing', { rotation: 12, svgOrigin: '500 710', duration: 0.2, ease: 'sine.inOut' })
        .to('#swan', { y: 2, duration: 0.2, ease: 'sine.inOut' }, '<')
        .to('#raised-wing', { rotation: -4, svgOrigin: '500 710', duration: 0.18, ease: 'power2.out' })
        .to('#swan', { y: -8, duration: 0.18, ease: 'power2.out' }, '<')
        .to({}, { duration: 0.16 })
        .to('#raised-wing', { opacity: 0, rotation: 18, scale: 0.84, svgOrigin: '500 710', duration: 0.24, ease: 'power2.in' })
        .to('#wing', { opacity: 1, duration: 0.18 }, '<0.08');
    }
    scene.addEventListener('mouseenter', alert);
    scene.addEventListener('mouseleave', idle);
    scene.addEventListener('click', flap);
    buttons.idle.addEventListener('click', (e) => { e.stopPropagation(); idle(); });
    buttons.alert.addEventListener('click', (e) => { e.stopPropagation(); alert(); });
    buttons.flap.addEventListener('click', (e) => { e.stopPropagation(); flap(); });
    setState('idle');
  </script>
</body>
</html>
